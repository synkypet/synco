name: SYNCO Queue Pump

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call heartbeat
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Starting heartbeat at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl --fail-with-body \
            --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 90 \
            -X GET "${APP_URL}/api/maintenance/heartbeat" \
            -H "x-cron-secret: ${CRON_SECRET}"
          echo ""
          echo "Heartbeat finished"
